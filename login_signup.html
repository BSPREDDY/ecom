<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup — ShopMate</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>

<body>
    <div class="auth-container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>

        <div class="auth-header">
            <div class="logo">
                <span class="logo-mark">SM</span>
                <span class="logo-text">ShopMate</span>
            </div>
            <p class="auth-subtitle">Your Ultimate Shopping Destination</p>
        </div>

        <div class="form-container">
            <div class="form-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form class="form-section active" id="loginForm" data-form="login">
                <div class="form-group">
                    <label class="form-label">Email Address <span class="required">*</span></label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="your.email@example.com"
                        required>
                    <div class="error-message" id="loginEmailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password"
                            required>
                        <button type="button" class="toggle-password" data-target="loginPassword">👁️</button>
                    </div>
                    <div class="error-message" id="loginPasswordError"></div>
                </div>

                <div class="forgot-password">
                    <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                </div>

                <button type="submit" class="submit-btn">🔐 Login to Your Account</button>

                <div class="divider">or continue with</div>

                <div class="social-login">
                    <button type="button" class="social-btn" title="Login with Google">🔍</button>
                    <button type="button" class="social-btn" title="Login with Facebook">📘</button>
                    <button type="button" class="social-btn" title="Login with Apple">🍎</button>
                </div>
            </form>

            <!-- Signup Form -->
            <form class="form-section" id="signupForm" data-form="signup">
                <div class="form-group">
                    <label class="form-label">Full Name <span class="required">*</span></label>
                    <input type="text" class="form-input" id="signupName" placeholder="Enter your full name" required>
                    <div class="error-message" id="signupNameError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address <span class="required">*</span></label>
                    <input type="email" class="form-input" id="signupEmail" placeholder="your.email@example.com"
                        required>
                    <div class="error-message" id="signupEmailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="signupPassword"
                            placeholder="Create a strong password" required>
                        <button type="button" class="toggle-password" data-target="signupPassword">👁️</button>
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                    <div class="error-message" id="signupPasswordError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password <span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="confirmPassword"
                            placeholder="Re-enter your password" required>
                        <button type="button" class="toggle-password" data-target="confirmPassword">👁️</button>
                    </div>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <button type="submit" class="submit-btn">🚀 Create Your Account</button>

                <div class="divider">or sign up with</div>

                <div class="social-login">
                    <button type="button" class="social-btn" title="Sign up with Google">🔍</button>
                    <button type="button" class="social-btn" title="Sign up with Facebook">📘</button>
                    <button type="button" class="social-btn" title="Sign up with Apple">🍎</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">
        <span style="font-size: 1.5rem;">✓</span>
        <span id="toastMessage"></span>
    </div>

    <script type="module" src="/scripts/firebase-config.js"></script>
    <script type="module" src="/scripts/script.js"></script>
</body>

</html>
